<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>James Routley | Feed</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="../styles.css"
      media="screen"
    />
  </head>
  <body>
    <a href="/index.html">Back</a>
    <a href="https://haxxorwpm.0s.is/">Original</a>
    <h1>Typing Speed Test, but for Developers</h1>
    
    <div id="readability-page-1" class="page"><div>
      <header>
        <a href="https://haxxorwpm.0s.is/" aria-label="HaxxorWPM home">
          <span aria-hidden="true">$_</span>
          <span>HaxxorWPM</span>
        </a>
        
      </header>

      <section>
        <section aria-labelledby="testTitle">
          <div>
            <div>
              <p>Terminal command typing</p>
              
            </div>
            <p><span id="timeLeft">60</span>
              <small>sec</small>
            </p>
          </div>

          <div aria-label="Test controls">
            <div>
              <p><span>Mode</span></p>
            </div>
            <div>
              <p><span>Time</span></p>
            </div>
          </div>

          <div aria-label="Live metrics">
            <p><span id="wpmValue">0</span>
              <small>WPM</small>
            </p>
            <p><span id="accuracyValue">100</span>
              <small>Accuracy</small>
            </p>
            <p><span id="commandValue">0</span>
              <small>Commands</small>
            </p>
            <p><span id="mistakeValue">0</span>
              <small>Mistakes</small>
            </p>
          </div>

          

          <label>
            <span>
              <span id="inputLabel">Start typing to begin</span>
              <span aria-live="polite"><span id="inlineTimeLeft">60</span>s</span>
            </span>
            
          </label>
        </section>

        
      </section>
    </div></div>
  </body>
</html>
