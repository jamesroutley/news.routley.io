<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>James Routley | Feed</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="../styles.css"
      media="screen"
    />
  </head>
  <body>
    <a href="/index.html">Back</a>
    <a href="https://ppo.gradexp.xyz/">Original</a>
    <h1>Show HN: Watch a neural net learn to play Snake</h1>
    
    <div id="readability-page-1" class="page"><div>

<!-- ============================== TRAIN ============================== -->
<main id="view-train">

  <!-- LEFT: live env -->
  <section>
    <div>
      <h2>Environment Sample</h2>
      <p><span>
        <span id="statusDot"></span>
        <span id="status">idle</span>
      </span>
    </p></div>
    
    
  </section>

  <!-- RIGHT: metrics + chart + log -->
  
</main>

<!-- ============================== WATCH ============================== -->
<div id="view-play">
  <section>
    <div>
      <h2>Trained-policy roll-outs</h2>
      <p><span>
        <span id="playRollouts">0</span>
        <span>·</span>
        trained <span id="playTrainedRollouts">0</span>
      </span>
    </p></div>
    <p>
      
      <span></span>
      <label>grid
        
      </label>
      <label>delay
        
        <span><span id="playDelayLabel">40</span> ms</span>
      </label>
    </p>
    
  </section>
</div>

<!-- ============================== WEIGHTS ============================ -->
<!-- 3D tensor viewer for live model weights. Hosted by the vendored Sokol /
     Zig / ImGui WASM renderer in dist/sokol/. Feeds off the snapshot buffer
     that the gradexp hook fills every 100 rollouts (?gradexp_tensors_every). -->
<div id="view-weights">
  <section>
    <p><label>parameter
        
      </label>
      <label> live updates</label>
      
      <span></span>
      <span id="weightStatus">waiting for first snapshot…</span>
    </p>
    <div id="weightsCanvasFrame">
      <canvas id="canvas" tabindex="0"></canvas>
      <p>Initializing 3D renderer…</p>
    </div>
    <p><label for="weightsStepSlider">step #</label>
      
      <span id="weightsStepLabel">—</span>
    </p>
    <p><span id="weightMeta">no tensor loaded</span>
    </p>
  </section>
</div>

<!-- ============================== COMPARE ============================ -->
<div id="view-compare">
  <section>
    <div>
      <h2>Configure runs</h2>
      <p><label>preset
          
        </label>
        
      </p>
      
      <p>
        
        
        <span></span>
        <span id="compareStatus">idle</span>
      </p>
    </div>
    <p>no runs yet</p>
    
  </section>
</div>

</div></div>
  </body>
</html>
