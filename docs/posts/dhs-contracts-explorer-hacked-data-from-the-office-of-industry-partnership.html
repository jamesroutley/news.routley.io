<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>James Routley | Feed</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="../styles.css"
      media="screen"
    />
  </head>
  <body>
    <a href="/index.html">Back</a>
    <a href="https://micahflee.github.io/ice-contracts/">Original</a>
    <h1>DHS Contracts Explorer – Hacked data from the Office of Industry Partnership</h1>
    
    <div id="readability-page-1" class="page"><section>
        

        <section>
          <div>
            <h2>State Map</h2>
            <p><small>Bubble size represents total award amount</small>
          </p></div>
          
        </section>

        <section>
          <p>
            <h2>Companies</h2>
          </p>
          
          <div>
            <table>
              <thead>
                <tr>
                  <th data-table="companies" data-sort-key="companyName" data-label="Company">Company</th>
                  <th data-table="companies" data-sort-key="contractCount" data-label="Contracts">Contracts</th>
                  <th data-table="companies" data-sort-key="totalAward" data-label="Total Award">Total Award</th>
                  <th data-table="companies" data-sort-key="totalObligation" data-label="Total Obligation">Total Obligation</th>
                </tr>
              </thead>
              <tbody id="companiesTableBody"></tbody>
            </table>
          </div>
        </section>

        <section>
          <p>
            <h2>Contracts</h2>
          </p>
          
          <div>
            <table>
              <thead>
                <tr>
                  <th data-table="contracts" data-sort-key="awardId" data-label="Award ID">Award ID</th>
                  <th data-table="contracts" data-sort-key="companyName" data-label="Company">Company</th>
                  <th data-table="contracts" data-sort-key="programName" data-label="Program">Program</th>
                  <th data-table="contracts" data-sort-key="phaseType" data-label="Phase">Phase</th>
                  <th data-table="contracts" data-sort-key="awardType" data-label="Award Type">Award Type</th>
                  <th data-table="contracts" data-sort-key="popStartDate" data-label="Start">Start</th>
                  <th data-table="contracts" data-sort-key="popEndDate" data-label="End">End</th>
                  <th data-table="contracts" data-sort-key="awardAmount" data-label="Award">Award</th>
                  <th data-table="contracts" data-sort-key="state" data-label="State">State</th>
                </tr>
              </thead>
              <tbody id="contractsTableBody"></tbody>
            </table>
          </div>
        </section>
      </section></div>
  </body>
</html>
