    <h1> app name (the SEO/share-preview bits that no-JS scrapers read).
  -->
  <div>
    <header id="appHeader">
      
    </header>

    <div>
      
    </div>

    <div>

          <g id="pathSegs"></g>
        </svg>
        
      </div>
    </div>

    

    <div id="complete">

    </div>

        </div>

        </div>
