<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>James Routley | Feed</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="../styles.css"
      media="screen"
    />
  </head>
  <body>
    <a href="/index.html">Back</a>
    <a href="https://explorer.samismith.com/">Original</a>
    <h1>Explore Wikipedia Like a Windows XP Desktop</h1>
    
    <div id="readability-page-1" class="page"><div>

    <!-- ── Desktop icons (top-left, double-click to open) ───────────── -->
    

    <!-- Explorer windows (both Geofile and Wikipedia) are now spawned
         dynamically by desktop.js — each desktop-icon click creates a fresh
         .explorer-pane and appends it here in .desktop. No static mount
         points needed. -->


    <!-- Reader windows are now spawned dynamically per article — see
         _spawnReader in js/wikipedia.js. No static mount point needed. -->

    <!-- ── Media Viewer (opens when a Commons file is double-clicked) ─ -->
    

    <!-- ── Readme.txt window — styled as a real Notepad .txt note ──── -->
    

    <!-- ── Upload (Add an Image / Note) modal — singleton, opened by Geofile ─ -->
    <div id="uploadModal">
      
      <div role="dialog" aria-modal="true">
        <div>
          <p>Add an image</p>
          
        </div>
        <div>
          

          <form id="uploadForm" autocomplete="off">
            <!-- Photo pane -->
            <div data-pane="photo">
              <div id="uploadDropzone">
                <p>
                <label for="uploadFile">Choose an image</label>
                <span>or drop one here</span></p>
              </div>
              <p><img id="uploadPreview" alt=""/>
              <label>
                <span>Caption <em>(optional)</em></span>
                
              </label>
            </p></div>
            <!-- Note pane -->
            

            <label>
              <span>Your name <em>(optional)</em></span>
              
            </label>

            

            
          </form>
        </div>
      </div>
    </div>

    <!-- ── Contribution viewer — image preview for approved/pending uploads ─ -->
    <div id="contribViewer">
      
      <div role="dialog" aria-modal="true">
        <div>
          <p>Image</p>
          
        </div>
        
      </div>
    </div>

    <!-- ── Start menu (XP two-column layout) ─────────────────────── -->
    <div id="startMenu">
      <!-- Top blue header strip with "username" + avatar. -->
      <div>
        <p>🙂</p>
        <p>User</p>
      </div>
      <!-- Two columns. -->
      <div>
        <div>
          
          <p><span>All Programs</span>
            <span>▶</span>
          </p>
        </div>
        <div>
          
          </div>
      </div>
    </div>

    <!-- ── Taskbar ─────────────────────────────────────────────────── -->
    <div>
      
      <p><span id="taskbarClock">—</span>
      </p>
    </div>

  </div></div>
  </body>
</html>
